{% if languages %}
<div class="ep-list-wrap">
    {% for lang in languages %}

    <div class="ep-row {% if lang.is_mother_tongue %}border-accent{% else %}border-muted{% endif %}">

        <div class="lang-badge {% if lang.is_mother_tongue %}bg-label-primary{% else %}bg-label-secondary{% endif %}">
            {{ lang.language_name|slice:":2"|upper }}
        </div>

        <div class="flex-fill" style="min-width:0;">
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <span class="ep-title">{{ lang.language_name }}</span>
                {% if lang.is_mother_tongue %}
                    <span class="badge bg-label-primary" style="font-size:10px;">
                        <i class="ti tabler-home me-1"></i>Mother Tongue
                    </span>
                {% endif %}
            </div>
            <div class="d-flex flex-wrap gap-2 mt-2">
                <span class="skill-chip {% if lang.can_read %}skill-on{% else %}skill-off{% endif %}">
                    <i class="ti {% if lang.can_read %}tabler-check{% else %}tabler-x{% endif %}"></i>Read
                </span>
                <span class="skill-chip {% if lang.can_write %}skill-on{% else %}skill-off{% endif %}">
                    <i class="ti {% if lang.can_write %}tabler-check{% else %}tabler-x{% endif %}"></i>Write
                </span>
                <span class="skill-chip {% if lang.can_speak %}skill-on{% else %}skill-off{% endif %}">
                    <i class="ti {% if lang.can_speak %}tabler-check{% else %}tabler-x{% endif %}"></i>Speak
                </span>
            </div>
        </div>

        <div class="ep-actions">
            <a href="#" class="btn btn-sm btn-label-info waves-effect"
               onclick="OpenLanguageForm('{{ obj.employee_unique_id }}', {{ lang.employee_language_id }}); return false;">
                <i class="ti tabler-edit"></i>
            </a>
            <button class="btn btn-sm btn-label-danger waves-effect"
                    onclick="DeleteLanguage({{ lang.employee_language_id }}, '{{ obj.employee_unique_id }}')">
                <i class="ti tabler-trash"></i>
            </button>
        </div>

    </div>
    {% endfor %}
</div>
{% else %}
<div class="empty-state-grid">
    <i class="ti tabler-language-off"></i>
    <p>No language records added yet.<br>
       <span style="font-size:12px;">Click <strong>Add Language</strong> to add the first one.</span>
    </p>
</div>
{% endif %}
