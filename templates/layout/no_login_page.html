    <style>
        .captcha-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .captcha-image-wrapper {
            flex: 1;
            border: 1px solid #d9dee3;
            border-radius: 6px;
            overflow: hidden;
            background: #f8f9fa;
            height: 45px;
            display: flex;
            align-items: center;
        }

        .captcha-image {
            display: block;
            width: 100%;
            height: 50px;
            object-fit: fill;
            image-rendering: pixelated;
        }

        .captcha-refresh {
            min-width: 42px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .captcha-refresh:hover {
            background-color: #e7e9ed;
        }

        .captcha-refresh:active {
            transform: scale(0.95);
        }

        .captcha-refresh i {
            font-size: 1.2rem;
        }

        .captcha-refresh.spinning i {
            animation: spin 0.6s linear;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            10%, 30%, 50%, 70%, 90% {
                transform: translateX(-4px);
            }
            20%, 40%, 60%, 80% {
                transform: translateX(4px);
            }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
            border-color: #ff3e1d !important;
        }

        .captcha-loading {
            opacity: 0.5;
            pointer-events: none;
        }

        .form-label, .col-form-label {
            font-weight: 700;
        }

        .my-8 {
            margin-block-start: 1rem !important;
            margin-block-end: 1rem !important;
        }

        .my-6 {
            margin-block-start: 1rem !important;
            margin-block-end: 1rem !important;
        }

        .error-message {
            color: red;
        }
        .ss {
            overflow-y: hidden;
            background-size: cover;
            background-image: url(/static/assets/img/backgrounds/bg2.png),
            url(/static/assets/img/backgrounds/bg2.png);
        }

    </style>
    <link rel="stylesheet" href="/static/assets/vendor/libs/@form-validation/form-validation.css" media="print"
