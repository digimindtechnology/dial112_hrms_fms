<div class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title">{% if district %}Edit District{% else %}Add District{% endif %}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <form id="frm_District" method="post" action="{% url 'AddUpdateDistrict' %}{% if district %}{{ district.district_id }}/{% endif %}">
        {% csrf_token %}
        <div class="modal-body">
            <div class="mb-4">
                <label class="form-label">District Name <span class="text-danger">*</span></label>
                <input type="text" name="district_name" class="form-control" value="{{ district.district_name|default:'' }}" required placeholder="Enter district name">
            </div>
            <div class="mb-4">
                <label class="form-label">Country</label>
                <select name="country_id" class="form-select" onchange="loadStatesForDistrict(this.value)">
                    <option value="">Select Country</option>
                    {% for c in countries %}
                    <option value="{{ c.country_id }}" {% if district and district.state.country_id == c.country_id %}selected{% endif %}>{{ c.country_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label">State <span class="text-danger">*</span></label>
                <select name="state_id" class="form-select" id="district_state_id" required>
                    <option value="">Select State</option>
                    {% for s in states %}
                    <option value="{{ s.state_id }}" {% if district and district.state_id == s.state_id %}selected{% endif %}>{{ s.state_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label">Division</label>
                <select name="division_id" class="form-select">
                    <option value="">Select Division</option>
                    {% for div in divisions %}
                    <option value="{{ div.division_id }}" {% if district and district.division_id == div.division_id %}selected{% endif %}>{{ div.division_name }}{% if div.state %} - {{ div.state.state_name }}{% endif %}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label">Zone</label>
                <select name="zone_id" class="form-select">
                    <option value="">Select Zone</option>
                    {% for z in zones %}
                    <option value="{{ z.zone_id }}" {% if district and district.zone_id == z.zone_id %}selected{% endif %}>{{ z.zone_name }}{% if z.state %} - {{ z.state.state_name }}{% endif %}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <div class="form-check">
                    <input type="checkbox" name="is_active" class="form-check-input" id="district_active" {% if district.is_active or not district %}checked{% endif %}>
                    <label class="form-check-label" for="district_active">Active</label>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-label-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary loading_spinner">{% if district %}Update{% else %}Save{% endif %}</button>
        </div>
    </form>
</div>
<script>
function loadStatesForDistrict(countryId) {
    if (!countryId) { $('#district_state_id').html('<option value="">Select State</option>'); return; }
    $.getJSON('/masters/GetStateListJson/?countryID=' + countryId, function(data) {
        var opts = '<option value="">Select State</option>';
        $.each(data, function(i, d) { opts += '<option value="' + d.pk + '">' + d.fields.state_name + '</option>'; });
        $('#district_state_id').html(opts);
    });
}
$('#frm_District').on('submit', function(e) {
    e.preventDefault();
    $.post($(this).attr('action'), $(this).serialize(), function(response) {
        if (response.success) {
            $('#Modal_SetupForm').modal('hide');
            $.get("{% url 'DistrictList' %}", function(d) {
                $('#div_DistrictList').html(d);
                initDataTable('#districtTable');
            });
        }
    });
});
</script>
