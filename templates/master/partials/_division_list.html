<div>
    <div class="card-header border-bottom d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0">Divisions</h5>
        <div class="d-flex gap-2">
            <button class="btn btn-success btn-sm" onclick="showImportModal('Division')">
                <i class="ti tabler-upload me-1"></i> Import
            </button>
            <div class="dropdown">
                <button class="btn btn-info btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="ti tabler-download me-1"></i> Export
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="{% url 'ExportCSV' 'Division' %}">CSV</a></li>
                    <li><a class="dropdown-item" href="{% url 'ExportExcel' 'Division' %}">Excel</a></li>
                </ul>
            </div>
            <button class="btn btn-primary btn-sm" onclick="openSetupForm('{% url 'AddUpdateDivision' %}')">
                <i class="ti tabler-plus me-1"></i> Add Division
            </button>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover" id="divisionTable">
            <thead class="border-top">
                <tr>
                    <th>Sr.</th>
                    <th>Division Name</th>
                    <th>Code</th>
                    <th>State</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for d in divisions %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ d.division_name }}</td>
                    <td>{{ d.division_code|default:'-' }}</td>
                    <td>{{ d.state.state_name }}</td>
                    <td><span class="badge bg-label-{% if d.is_active %}success{% else %}danger{% endif %}">{% if d.is_active %}Active{% else %}Inactive{% endif %}</span></td>
                    <td>
                        <button class="btn btn-icon btn-text-secondary waves-effect rounded-pill" onclick="openSetupForm('{% url 'AddUpdateDivision' d.division_id %}')">
                            <i class="ti tabler-edit ti-md"></i>
                        </button>
                        <button class="btn btn-icon btn-text-danger waves-effect rounded-pill" onclick="deleteSetupItem('{% url 'DeleteDivision' %}', {{ d.division_id }}, 'division')">
                            <i class="ti tabler-trash ti-md"></i>
                        </button>
                    </td>
                </tr>
                {% empty %}
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
