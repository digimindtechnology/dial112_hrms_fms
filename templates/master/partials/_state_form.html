<div class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title">{% if state %}Edit State{% else %}Add State{% endif %}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <form id="frm_State" method="post" action="{% url 'AddUpdateState' %}{% if state %}{{ state.state_id }}/{% endif %}">
        {% csrf_token %}
        <div class="modal-body">
            <div class="mb-4">
                <label class="form-label">State Name <span class="text-danger">*</span></label>
                <input type="text" name="state_name" class="form-control" value="{{ state.state_name|default:'' }}" required placeholder="Enter state name">
            </div>
            <div class="mb-4">
                <label class="form-label">Country <span class="text-danger">*</span></label>
                <select name="country_id" class="form-select" required>
                    <option value="">Select Country</option>
                    {% for c in countries %}
                    <option value="{{ c.country_id }}" {% if state and state.country_id == c.country_id %}selected{% endif %}>{{ c.country_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <div class="form-check">
                    <input type="checkbox" name="is_active" class="form-check-input" id="state_active" {% if state.is_active or not state %}checked{% endif %}>
                    <label class="form-check-label" for="state_active">Active</label>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-label-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary loading_spinner">{% if state %}Update{% else %}Save{% endif %}</button>
        </div>
    </form>
</div>
<script>
$('#frm_State').on('submit', function(e) {
    e.preventDefault();
    $.post($(this).attr('action'), $(this).serialize(), function(response) {
        if (response.success) {
            $('#Modal_SetupForm').modal('hide');
            $.get("{% url 'StateList' %}", function(d) {
                $('#div_StateList').html(d);
                initDataTable('#stateTable');
            });
        }
    });
});
</script>
