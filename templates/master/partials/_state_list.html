<div>
    <div class="card-header border-bottom d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0">States</h5>
        <div class="d-flex gap-2">
            <button class="btn btn-success btn-sm" onclick="showImportModal('State')">
                <i class="ti tabler-upload me-1"></i> Import
            </button>
            <div class="dropdown">
                <button class="btn btn-info btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="ti tabler-download me-1"></i> Export
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="{% url 'ExportCSV' 'State' %}">CSV</a></li>
                    <li><a class="dropdown-item" href="{% url 'ExportExcel' 'State' %}">Excel</a></li>
                </ul>
            </div>
            <button class="btn btn-primary btn-sm" onclick="openSetupForm('{% url 'AddUpdateState' %}')">
                <i class="ti tabler-plus me-1"></i> Add State
            </button>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-hover" id="stateTable">
            <thead class="border-top">
                <tr>
                    <th>Sr.</th>
                    <th>State Name</th>
                    <th>Country</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for s in states %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ s.state_name }}</td>
                    <td>{{ s.country.country_name }}</td>
                    <td><span class="badge bg-label-{% if s.is_active %}success{% else %}danger{% endif %}">{% if s.is_active %}Active{% else %}Inactive{% endif %}</span></td>
                    <td>
                        <button class="btn btn-icon btn-text-secondary waves-effect rounded-pill" onclick="openSetupForm('{% url 'AddUpdateState' s.state_id %}')">
                            <i class="ti tabler-edit ti-md"></i>
                        </button>
                        <button class="btn btn-icon btn-text-danger waves-effect rounded-pill" onclick="deleteSetupItem('{% url 'DeleteState' %}', {{ s.state_id }}, 'state')">
                            <i class="ti tabler-trash ti-md"></i>
                        </button>
                    </td>
                </tr>
                {% empty %}
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
