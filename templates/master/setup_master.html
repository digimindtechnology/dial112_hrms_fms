{% extends "layout/layout_base.html" %}
{% load static %}

{% block title %}Setup - Master Data{% endblock %}

{% block content %}
    {% include 'layout/datatables.html' %}

    <style>
        .nav-align-top > .nav.nav-pills .nav-item:not(:last-child), .nav-align-bottom > .nav.nav-pills .nav-item:not(:last-child), .card > .nav.nav-pills .nav-item:not(:last-child) {
            margin-inline-end: 0rem;
        }
    </style>
    <div class="nav-align-top mb-6">
        <ul class="nav nav-pills flex-column flex-md-row mb-6 gap-2 gap-lg-0" role="tablist">
            <li class="nav-item">
                <button type="button" class="nav-link active" role="tab" data-bs-toggle="tab" data-bs-target="#tab-countries" aria-controls="tab-countries" aria-selected="true">
                    <i class="menu-icon icon-base ti tabler-world me-0"></i> Country
                </button>
            </li>

            <li class="nav-item">
                <button type="button" class="nav-link" role="tab" data-bs-toggle="tab" data-bs-target="#tab-states" aria-controls="tab-states" aria-selected="false">
                    <i class="menu-icon icon-base ti tabler-map-pin me-0"></i> State
                </button>
            </li>
           <li class="nav-item d-none">
                <button type="button" class="nav-link" role="tab" data-bs-toggle="tab" data-bs-target="#tab-divisions" aria-controls="tab-divisions" aria-selected="false">
                    <i class="menu-icon icon-base ti tabler-sitemap me-0"></i> Division
                </button>
            </li>
           <li class="nav-item d-none">
                <button type="button" class="nav-link" role="tab" data-bs-toggle="tab" data-bs-target="#tab-districts" aria-controls="tab-districts" aria-selected="false">
                    <i class="menu-icon icon-base ti tabler-building-community me-0"></i> District
                </button>
            </li>
           <li class="nav-item d-none">
                <button type="button" class="nav-link" role="tab" data-bs-toggle="tab" data-bs-target="#tab-zones" aria-controls="tab-zones" aria-selected="false">
                    <i class="menu-icon icon-base ti tabler-map me-0"></i> Zone
                </button>
            </li>
            <li class="nav-item d-none">
                <button type="button" class="nav-link" role="tab" data-bs-toggle="tab" data-bs-target="#tab-cities" aria-controls="tab-cities" aria-selected="false">
                    <i class="menu-icon icon-base ti tabler-building me-0"></i> City
                </button>
            </li>

            <li class="nav-item">
                <button type="button" class="nav-link" role="tab" data-bs-toggle="tab" data-bs-target="#tab-currencies" aria-controls="tab-currencies" aria-selected="false">
                    <i class="menu-icon icon-base ti tabler-coin me-0"></i> Currency
                </button>
            </li>
            <li class="nav-item">
                <button type="button" class="nav-link" role="tab" data-bs-toggle="tab" data-bs-target="#tab-timezones" aria-controls="tab-timezones" aria-selected="false">
                    <i class="menu-icon icon-base ti tabler-clock me-0"></i> Time Zone
                </button>
            </li>
            <li class="nav-item">
                <button type="button" class="nav-link" role="tab" data-bs-toggle="tab" data-bs-target="#tab-dateformats" aria-controls="tab-dateformats" aria-selected="false">
                    <i class="menu-icon icon-base ti tabler-calendar me-0"></i> Date Format
                </button>
            </li>
            <li class="nav-item">
                <button type="button" class="nav-link" role="tab" data-bs-toggle="tab" data-bs-target="#tab-timeformats" aria-controls="tab-timeformats" aria-selected="false">
                    <i class="menu-icon icon-base ti tabler-clock-hour-4 me-0"></i> Time Format
                </button>
            </li>
        </ul>

        <div class="tab-content card">
            <div class="tab-pane fade show active" id="tab-countries" role="tabpanel">
                <div id="div_CountryList" data-loaded="0"></div>
            </div>
            <div class="tab-pane fade" id="tab-currencies" role="tabpanel">
                <div id="div_CurrencyList" data-loaded="0"></div>
            </div>
            <div class="tab-pane fade" id="tab-states" role="tabpanel">
                <div id="div_StateList" data-loaded="0"></div>
            </div>
            <div class="tab-pane fade" id="tab-divisions" role="tabpanel">
                <div id="div_DivisionList" data-loaded="0"></div>
            </div>
            <div class="tab-pane fade" id="tab-districts" role="tabpanel">
                <div id="div_DistrictList" data-loaded="0"></div>
            </div>
            <div class="tab-pane fade" id="tab-zones" role="tabpanel">
                <div id="div_ZoneList" data-loaded="0"></div>
            </div>
            <div class="tab-pane fade" id="tab-cities" role="tabpanel">
                <div id="div_CityList" data-loaded="0"></div>
            </div>
            <div class="tab-pane fade" id="tab-timezones" role="tabpanel">
                <div id="div_TimeZoneList" data-loaded="0"></div>
            </div>
            <div class="tab-pane fade" id="tab-dateformats" role="tabpanel">
                <div id="div_DateFormatList" data-loaded="0"></div>
            </div>
            <div class="tab-pane fade" id="tab-timeformats" role="tabpanel">
                <div id="div_TimeFormatList" data-loaded="0"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="Modal_SetupForm" tabindex="-1" aria-modal="true" role="dialog">
        <div class="modal-dialog modal-dialog-centered">
            <div id="div_SetupForm"></div>
        </div>
    </div>

    <div class="modal fade" id="Modal_Import" tabindex="-1" aria-modal="true" role="dialog">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="importModalTitle">Import</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="importForm" enctype="multipart/form-data">
                    <div class="modal-body">
                        <div class="mb-4">
                            <label class="form-label">Select file (CSV or Excel)</label>
                            <input type="file" name="file" class="form-control" accept=".csv,.xlsx" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">File format</label>
                            <select name="format" class="form-select">
                                <option value="csv">CSV</option>
                                <option value="xlsx">Excel (XLSX)</option>
                            </select>
                        </div>
                        <div class="alert alert-info" role="alert">
                            <strong>Template:</strong>
                            <a href="#" id="downloadCsvLink" class="alert-link">Download CSV</a> |
                            <a href="#" id="downloadExcelLink" class="alert-link">Download Excel</a>
                            <br>Existing records with the same unique identifier will be updated.
                        </div>
                        <div id="importResult" class="mt-3"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="importBtn">Import</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        var importEntityName = '';
        function loadTab(url, containerId, tableId, forceReload) {
            var container = document.getElementById(containerId);
            if (!container) return;
            if (container.dataset.loaded === '1' && !forceReload) {
                if (tableId) initDataTable(tableId);
                return;
            }
            container.innerHTML = '<div class="p-4 text-center text-muted"><span class="spinner-border spinner-border-sm me-2"></span>Loading...</div>';
            $.get(url, function (data) {
                container.innerHTML = data;
                container.dataset.loaded = '1';
                initDataTable(tableId);
            });
        }

        var setupTabMap = {
            '#tab-countries': ['{% url 'CountryList' %}', 'div_CountryList', '#countryTable'],
            '#tab-currencies': ['{% url 'CurrencyList' %}', 'div_CurrencyList', '#currencyTable'],
            '#tab-states': ['{% url 'StateList' %}', 'div_StateList', '#stateTable'],
            '#tab-divisions': ['{% url 'DivisionList' %}', 'div_DivisionList', '#divisionTable'],
            '#tab-districts': ['{% url 'DistrictList' %}', 'div_DistrictList', '#districtTable'],
            '#tab-zones': ['{% url 'ZoneList' %}', 'div_ZoneList', '#zoneTable'],
            '#tab-cities': ['{% url 'CityList' %}', 'div_CityList', '#cityTable'],
            '#tab-timezones': ['{% url 'TimeZoneList' %}', 'div_TimeZoneList', '#timezoneTable'],
            '#tab-dateformats': ['{% url 'DateFormatList' %}', 'div_DateFormatList', '#dateformatTable'],
            '#tab-timeformats': ['{% url 'TimeFormatList' %}', 'div_TimeFormatList', '#timeformatTable'],
        };

        function refreshActiveSetupTab() {
            var activeTab = document.querySelector('.nav-pills .active');
            if (!activeTab) return;
            var target = activeTab.getAttribute('data-bs-target');
            var info = setupTabMap[target];
            if (!info) return;
            var container = document.getElementById(info[1]);
            if (container) container.dataset.loaded = '0';
            loadTab(info[0], info[1], info[2], true);
        }

        function showImportModal(entity) {
            importEntityName = entity;
            document.getElementById('importModalTitle').textContent = 'Import ' + entity + 's';
            document.getElementById('downloadCsvLink').href = "{% url 'ExportCSV' 'ENTITY_PLACEHOLDER' %}".replace('ENTITY_PLACEHOLDER', entity);
            document.getElementById('downloadExcelLink').href = "{% url 'ExportExcel' 'ENTITY_PLACEHOLDER' %}".replace('ENTITY_PLACEHOLDER', entity);
            document.getElementById('importResult').innerHTML = '';
            document.getElementById('importForm').reset();
            $('#Modal_Import').modal('show');
        }

        document.getElementById('importForm').addEventListener('submit', function (e) {
            e.preventDefault();
            if (!importEntityName) return;
            var formData = new FormData(this);
            var btn = document.getElementById('importBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Importing...';

            fetch("{% url 'ImportData' 'ENTITY_PLACEHOLDER' %}".replace('ENTITY_PLACEHOLDER', importEntityName), {
                method: 'POST',
                headers: {'X-CSRFToken': '{{ csrf_token }}'},
                body: formData
            })
                .then(function (r) {
                    return r.json();
                })
                .then(function (data) {
                    var div = document.getElementById('importResult');
                    if (data.success) {
                        div.innerHTML = '<div class="alert alert-success mb-0">' + data.message + '</div>';
                        setTimeout(function () {
                            $('#Modal_Import').modal('hide');
                            refreshActiveSetupTab();
                        }, 2000);
                    } else {
                        div.innerHTML = '<div class="alert alert-danger mb-0">' + (data.error || data.message) + '</div>';
                    }
                })
                .catch(function (err) {
                    document.getElementById('importResult').innerHTML = '<div class="alert alert-danger mb-0">' + err + '</div>';
                })
                .finally(function () {
                    btn.disabled = false;
                    btn.innerHTML = 'Import';
                });
        });

        document.addEventListener('DOMContentLoaded', function () {
            loadTab("{% url 'CountryList' %}", 'div_CountryList', '#countryTable');
            document.querySelectorAll('[data-bs-toggle="tab"]').forEach(function (tab) {
                tab.addEventListener('shown.bs.tab', function (e) {
                    var target = e.target.getAttribute('data-bs-target');
                    var info = setupTabMap[target];
                    if (info) loadTab(info[0], info[1], info[2]);
                });
            });
        });

        function openSetupForm(url) {
            $.get(url, function (data) {
                $('#div_SetupForm').html(data);
                $('#Modal_SetupForm').modal('show');
            });
        }

        function deleteSetupItem(url, pk, label) {
            if (!confirm('Are you sure you want to delete this ' + label + '?')) return;
            $.post(url, {'pk': pk, 'csrfmiddlewaretoken': '{{ csrf_token }}'}, function (response) {
                if (response.success) {
                    $('#Modal_SetupForm').modal('hide');
                    var activeTab = document.querySelector('.nav-pills .active');
                    if (activeTab) {
                        var target = activeTab.getAttribute('data-bs-target');
                        var info = setupTabMap[target];
                        if (info) loadTab(info[0], info[1], info[2], true);
                    }
                }
            });
        }
    </script>
{% endblock %}
