{% extends "layout/layout_base.html" %}
{% load static %}

{% block content %}
    <div class="row g-4">
        <div class="col-lg-3 col-sm-6">
            <a href="{% url 'setup-cost-center-list' %}" class="card h-100 text-decoration-none">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div class="card-title mb-0">
                        <h5 class="mb-1 me-2">Cost Centers</h5>
                        <p class="mb-0 text-body">Manage cost centers</p>
                    </div>
                    <div class="card-icon">
                        <span class="badge bg-label-primary rounded p-2">
                            <i class="icon-base ti tabler-calculator icon-26px"></i>
                        </span>
                    </div>
                </div>
            </a>
        </div>

        {% for item in setup_lookups %}
            <div class="col-lg-3 col-sm-6 d-none">
                <a href="{% url 'setup-lookup-list' item.slug %}" class="card h-100 text-decoration-none">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div class="card-title mb-0">
                            <h5 class="mb-1 me-2">{{ item.plural }}</h5>
                            <p class="mb-0 text-body">Manage {{ item.plural|lower }}</p>
                        </div>
                        <div class="card-icon">
                            <span class="badge bg-label-primary rounded p-2">
                                <i class="icon-base ti {{ item.icon }} icon-26px"></i>
                            </span>
                        </div>
                    </div>
                </a>
            </div>
        {% endfor %}
    </div>
{% endblock content %}
