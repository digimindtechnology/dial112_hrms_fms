<div class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title">{% if obj %}Edit Cost Center{% else %}Add Cost Center{% endif %}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <form id="frm_CostCenter" method="post" action="
            {% if obj %}{% url 'setup-cost-center-edit' obj.cost_center_id %}{% else %}{% url 'setup-cost-center-add' %}{% endif %}">
        {% csrf_token %}
        <div class="modal-body">
            <div class="mb-4">
                <label class="form-label">Cost Center Name <span class="text-danger">*</span></label>
                <input type="text" name="cost_center_name" class="form-control"
                       value="{{ obj.cost_center_name|default:'' }}" required placeholder="e.g. IT Infrastructure">
            </div>
            <div class="mb-4 d-none">
                <label class="form-label">Code</label>
                <input type="text" class="form-control" value="{{ obj.cost_center_code|default:'Auto-generated' }}"
                       readonly>
            </div>
            <div class="mb-4">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3"
                          placeholder="Optional description">{{ obj.description|default:'' }}</textarea>
            </div>
            <div class="mb-4">
                <div class="form-check">
                    <input type="checkbox" name="is_active" class="form-check-input" id="costcenter_active"
                           {% if obj.is_active or not obj %}checked{% endif %}>
                    <label class="form-check-label" for="costcenter_active">Active</label>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-label-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary loading_spinner"
                    data-original-text="{% if obj %}Update{% else %}Save{% endif %}">{% if obj %}Update{% else %}
                Save{% endif %}</button>
        </div>
    </form>
</div>
<script>
    $('#frm_CostCenter').on('submit', function (e) {
        e.preventDefault();
        var btn = $(this).find('.loading_spinner');
        btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span> Processing..');
        $.post($(this).attr('action'), $(this).serialize(), function (response) {
            if (response.success) {

                $('#Modal_CostCenter').modal('hide');
                Swal.fire({
                    icon: 'success',
                    title: 'saved successfully',
                    timer: 3000,
                    showConfirmButton: false
                });

                location.reload();
            } else {
                Swal.fire({
                    icon: 'error',
                    title: response.error || 'Something went wrong',
                    timer: 3000,
                    showConfirmButton: false
                });
                btn.prop('disabled', false).text(btn.data('original-text') || 'Save');
            }
        }).fail(function (xhr) {
            Swal.fire({
                icon: 'error',
                title: 'Server error: ' + (xhr.responseText || 'Unknown'),
                timer: 3000,
                showConfirmButton: false
            });
            btn.prop('disabled', false).text(btn.data('original-text') || 'Save');
        });
    });
</script>
