<div class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title">{% if obj %}Edit Holiday{% else %}Add Holiday{% endif %}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <form id="frm_Holiday" method="post"
          action="{% if obj %}{% url 'setup-holiday-edit' obj.holiday_id %}{% else %}{% url 'setup-holiday-add' %}{% endif %}">
        {% csrf_token %}
        <div class="modal-body">
            <div class="row g-3">

                <!-- Holiday Name & Date -->
                <div class="col-md-8">
                    <label class="form-label">Holiday Name <span class="text-danger">*</span></label>
                    <input type="text" name="holiday_name" class="form-control"
                           value="{{ obj.holiday_name|default:'' }}" required placeholder="Enter holiday name">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Date <span class="text-danger">*</span></label>
                    <input type="date" name="holiday_date" class="form-control"
                           value="{{ obj.holiday_date|date:'Y-m-d'|default:'' }}" required>
                </div>

                <!-- Description -->
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="2"
                              placeholder="Optional description">{{ obj.description|default:'' }}</textarea>
                </div>

                <!-- Checkboxes -->
                <div class="col-md-6">
                    <div class="form-check">
                        <input type="checkbox" name="is_national_holiday" class="form-check-input"
                               id="chk_national" {% if obj.is_national_holiday %}checked{% endif %}>
                        <label class="form-check-label" for="chk_national">National Holiday</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-check">
                        <input type="checkbox" name="is_active" class="form-check-input"
                               id="chk_active" {% if obj.is_active or not obj %}checked{% endif %}>
                        <label class="form-check-label" for="chk_active">Active</label>
                    </div>
                </div>

                <!-- District Selection -->
                <div class="col-12">
                    <label class="form-label fw-semibold">
                        Districts
                        <span class="text-muted fw-normal small">(leave all unchecked = applies to all districts)</span>
                    </label>

                    <div class="d-flex gap-2 align-items-center mb-1">
                        <input type="text" id="inp_HFDistrictSearch" class="form-control form-control-sm"
                               placeholder="Search district..." oninput="hfFilterDistricts()">
                        <div class="form-check mb-0 text-nowrap">
                            <input type="checkbox" class="form-check-input" id="hf_chk_SelectAll"
                                   onchange="hfToggleAll(this)">
                            <label class="form-check-label small" for="hf_chk_SelectAll">All</label>
                        </div>
                    </div>

                    <div style="max-height:200px;overflow-y:auto;border:1px solid #dee2e6;border-radius:6px;">
                        <table class="table table-sm table-hover mb-0" id="tbl_HFDistricts">
                            <tbody>
                            {% for d in all_districts %}
                            <tr class="hf-district-row">
                                <td style="width:36px;">
                                    <input type="checkbox" name="district_ids"
                                           class="form-check-input hf-chk-district"
                                           value="{{ d.district_id }}"
                                           {% if d.district_id in assigned_ids %}checked{% endif %}
                                           onchange="hfSyncMaster()">
                                </td>
                                <td class="hf-district-name">{{ d.district_name }}</td>
                            </tr>
                            {% empty %}
                            <tr><td colspan="2" class="text-center text-muted py-2">No districts available.</td></tr>
                            {% endfor %}
                            </tbody>
                        </table>
                    </div>

                    <div class="mt-1 text-muted small">
                        <span id="hf_lbl_DistrictCount">{{ assigned_ids|length }}</span> selected
                    </div>
                </div>

            </div>
        </div>

        <div class="modal-footer">
            <button type="button" class="btn btn-label-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary loading_spinner"
                    data-original-text="{% if obj %}Update{% else %}Save{% endif %}">
                {% if obj %}Update{% else %}Save{% endif %}
            </button>
        </div>
    </form>
</div>

<script>
(function () {
    /* ── define all functions first, then call ── */

    function hfSyncMaster() {
        var total   = $('.hf-chk-district:visible').length;
        var checked = $('.hf-chk-district:visible:checked').length;
        $('#hf_chk_SelectAll').prop('indeterminate', checked > 0 && checked < total);
        $('#hf_chk_SelectAll').prop('checked', total > 0 && checked === total);
        $('#hf_lbl_DistrictCount').text($('.hf-chk-district:checked').length);
    }

    function hfToggleAll(master) {
        $('.hf-chk-district:visible').prop('checked', master.checked);
        hfSyncMaster();
    }

    function hfFilterDistricts() {
        var q = $('#inp_HFDistrictSearch').val().toLowerCase();
        $('.hf-district-row').each(function () {
            $(this).toggle($(this).find('.hf-district-name').text().toLowerCase().indexOf(q) !== -1);
        });
        hfSyncMaster();
    }

    /* expose for inline onclick="" handlers */
    window.hfSyncMaster     = hfSyncMaster;
    window.hfToggleAll      = hfToggleAll;
    window.hfFilterDistricts = hfFilterDistricts;

    /* initialise after functions are defined */
    hfSyncMaster();

    /* ── form submit ── */
    $('#frm_Holiday').off('submit').on('submit', function (e) {
        e.preventDefault();
        var $form = $(this);
        var $btn  = $form.find('[type=submit]');
        var originalText = $btn.data('original-text') || $btn.text();
        $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span>Processing..');

        $.ajax({
            url:  $form.attr('action'),
            type: 'POST',
            data: $form.serialize(),
            success: function (resp) {
                if (resp.success) {
                    bootstrap.Modal.getOrCreateInstance(document.getElementById('Modal_Holiday')).hide();
                    Swal.fire({ icon: 'success', title: 'Saved successfully', timer: 2000, showConfirmButton: false });
                    setTimeout(function () { location.reload(); }, 2000);
                } else {
                    Swal.fire({ icon: 'error', title: resp.error || 'Something went wrong', timer: 3000, showConfirmButton: false });
                    $btn.prop('disabled', false).text(originalText);
                }
            },
            error: function (xhr) {
                Swal.fire({ icon: 'error', title: 'Server error: ' + (xhr.status || ''), timer: 3000, showConfirmButton: false });
                $btn.prop('disabled', false).text(originalText);
            }
        });
    });
}());
</script>
