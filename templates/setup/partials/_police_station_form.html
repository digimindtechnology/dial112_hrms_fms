<div class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title">{% if obj %}Edit Police Station{% else %}Add Police Station{% endif %}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <form id="frm_PoliceStation" method="post"
          action="{% if obj %}{% url 'setup-police-station-edit' obj.police_station_id %}{% else %}{% url 'setup-police-station-add' %}{% endif %}">
        {% csrf_token %}
        <div class="modal-body">
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Police Station Name <span class="text-danger">*</span></label>
                    <input type="text" name="police_station_name" class="form-control"
                           value="{{ obj.police_station_name|default:'' }}" required placeholder="Enter station name">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Station Code</label>
                    <input type="text" name="station_code" class="form-control"
                           value="{{ obj.station_code|default:'' }}" placeholder="e.g. PS001">
                </div>
                <div class="col-md-12">
                    <label class="form-label">District <span class="text-danger">*</span></label>
                    <select name="district_id" class="form-select" required>
                        <option value="">Select District</option>
                        {% for d in districts %}
                            <option value="{{ d.district_id }}"
                                {% if obj and obj.district_id == d.district_id %}selected{% endif %}>
                                {{ d.district_name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <input type="text" name="phone_number" class="form-control"
                           value="{{ obj.phone_number|default:'' }}" placeholder="Enter phone number">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control"
                           value="{{ obj.email|default:'' }}" placeholder="Enter email">
                </div>
                <div class="col-md-12">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control" rows="2"
                              placeholder="Enter address">{{ obj.address|default:'' }}</textarea>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Pincode</label>
                    <input type="text" name="pincode" class="form-control"
                           value="{{ obj.pincode|default:'' }}" placeholder="e.g. 400001">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Latitude</label>
                    <input type="number" name="latitude" class="form-control" step="any"
                           value="{{ obj.latitude|default:'' }}" placeholder="e.g. 19.0760">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Longitude</label>
                    <input type="number" name="longitude" class="form-control" step="any"
                           value="{{ obj.longitude|default:'' }}" placeholder="e.g. 72.8777">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Established Date</label>
                    <input type="date" name="established_date" class="form-control"
                           value="{{ obj.established_date|date:'Y-m-d'|default:'' }}">
                </div>
                <div class="col-md-6 d-flex align-items-end">
                    <div class="form-check mb-1">
                        <input type="checkbox" name="is_active" class="form-check-input" id="ps_active"
                               {% if obj.is_active or not obj %}checked{% endif %}>
                        <label class="form-check-label" for="ps_active">Active</label>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-label-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary loading_spinner"
                    data-original-text="{% if obj %}Update{% else %}Save{% endif %}">
                {% if obj %}Update{% else %}Save{% endif %}
            </button>
        </div>
    </form>
</div>

<script>
$('#frm_PoliceStation').on('submit', function (e) {
    e.preventDefault();
    var btn = $(this).find('.loading_spinner');
    btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span> Processing..');

    $.post($(this).attr('action'), $(this).serialize(), function (response) {
        if (response.success) {
            $('#Modal_PoliceStation').modal('hide');
            Swal.fire({icon: 'success', title: 'Saved successfully', timer: 3000, showConfirmButton: false});
            location.reload();
        } else {
            Swal.fire({icon: 'error', title: response.error || 'Something went wrong', timer: 3000, showConfirmButton: false});
            btn.prop('disabled', false).text(btn.data('original-text') || 'Save');
        }
    }).fail(function (xhr) {
        Swal.fire({icon: 'error', title: 'Server error: ' + (xhr.responseText || 'Unknown'), timer: 3000, showConfirmButton: false});
        btn.prop('disabled', false).text(btn.data('original-text') || 'Save');
    });
});
</script>
