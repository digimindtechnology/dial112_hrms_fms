<div class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title">{% if obj %}Edit {{ title }}{% else %}Add {{ title }}{% endif %}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <form id="frm_SetupLookup" method="post" action="{% if obj %}{% url 'setup-lookup-edit' slug obj.id %}{% else %}{% url 'setup-lookup-add' slug %}{% endif %}">
        {% csrf_token %}
        <div class="modal-body">
            <div class="mb-4">
                <label class="form-label">{{ title }} Name <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" value="{{ obj.name|default:'' }}" required>
            </div>
            {% if has_time %}
                <div class="mb-4">
                    <label class="form-label">Start Time</label>
                    <input type="time" name="start_time" class="form-control"
                           value="{{ obj.start_time|default:'' }}">
                </div>
                <div class="mb-4">
                    <label class="form-label">End Time</label>
                    <input type="time" name="end_time" class="form-control"
                           value="{{ obj.end_time|default:'' }}">
                </div>
                <div class="mb-4">
                    <div class="form-check">
                        <input type="checkbox" name="is_end_next_day" class="form-check-input" id="is_end_next_day"
                               {% if obj.is_end_next_day %}checked{% endif %}>
                        <label class="form-check-label" for="is_end_next_day">End Time is Next Day</label>
                    </div>
                </div>
            {% endif %}
            <div class="mb-4">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3">{{ obj.description|default:'' }}</textarea>
            </div>
            <div class="mb-4">
                <div class="form-check">
                    <input type="checkbox" name="is_active" class="form-check-input" id="setup_lookup_active"
                           {% if obj.is_active or not obj %}checked{% endif %}>
                    <label class="form-check-label" for="setup_lookup_active">Active</label>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-label-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary loading_spinner"
                    data-original-text="{% if obj %}Update{% else %}Save{% endif %}">
                {% if obj %}Update{% else %}Save{% endif %}
            </button>
        </div>
    </form>
</div>

<script>
$('#frm_SetupLookup').on('submit', function (e) {
    e.preventDefault();
    var btn = $(this).find('.loading_spinner');
    btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm me-1"></span> Processing..');

    $.post($(this).attr('action'), $(this).serialize(), function (response) {
        if (response.success) {
            $('#Modal_SetupLookup').modal('hide');
            Swal.fire({
                icon: 'success',
                title: 'saved successfully',
                timer: 3000,
                showConfirmButton: false
            });
            location.reload();
        } else {
            Swal.fire({
                icon: 'error',
                title: response.error || 'Something went wrong',
                timer: 3000,
                showConfirmButton: false
            });
            btn.prop('disabled', false).text(btn.data('original-text') || 'Save');
        }
    }).fail(function (xhr) {
        Swal.fire({
            icon: 'error',
            title: 'Server error: ' + (xhr.responseText || 'Unknown'),
            timer: 3000,
            showConfirmButton: false
        });
        btn.prop('disabled', false).text(btn.data('original-text') || 'Save');
    });
});
</script>
